; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17
build_src_filter = +<StatusLed.cpp>
test_build_src = yes

[env:adafruit_qtpy_esp32s2]
platform = espressif32
board = adafruit_qtpy_esp32s2
framework = arduino
board_build.partitions = partitions.csv
board_build.f_cpu = 80000000L
monitor_speed = 115200
test_ignore = *
build_flags = -std=gnu++17
build_unflags = -std=gnu++11
extra_scripts =
	pre:scripts/compress_web.py
	pre:scripts/get_version.py
lib_deps =
	adafruit/Adafruit NeoPixel@^1.15.2
	arduino-libraries/NTPClient@^3.2.1
	esp32async/ESPAsyncWebServer@^3.10.0
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.4.2
	DNSServer@^2.0.0
	adafruit/Adafruit SHT4x Library@^1.0.0
	adafruit/Adafruit BME680 Library@^2.0.4
	adafruit/Adafruit SGP40 Sensor@^1.1.4
	adafruit/Adafruit BMP3XX Library@^2.1.6
	sensirion/Sensirion I2C SCD4x@^1.1.0
	adafruit/Adafruit TSL2591 Library@^1.4.5
	adafruit/Adafruit PM25 AQI Sensor@^2.0.0
	adafruit/Adafruit VEML7700 Library@^2.1.6
	adafruit/Adafruit DPS310@^1.1.3
	claws/BH1750@^1.3.0
monitor_filters = esp32_exception_decoder
build_type = debug