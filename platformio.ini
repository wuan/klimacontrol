; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:native]
platform = native
test_build_src = yes
build_src_filter = -<*> +<show/> +<Timer.cpp> +<color.cpp> +<strip/> +<support/>
build_flags = -std=gnu++17
build_unflags = -std=gnu++11
;extra_scripts =
;	post:scripts/generate_coverage.py
;lib_deps =
;	https://github.com/skaygin/arduino-native
;	bblanchon/ArduinoJson@^6.21.3

[env:adafruit_qtpy_esp32s3_nopsram]
platform = espressif32
board = adafruit_qtpy_esp32s3_nopsram
framework = arduino
board_build.partitions = partitions.csv
test_ignore = *
test_filter = embedded/*
build_flags = -std=gnu++17
build_unflags = -std=gnu++11
extra_scripts =
	pre:scripts/compress_web.py
	pre:scripts/get_version.py
lib_deps =
	adafruit/Adafruit NeoPixel@^1.15.2
	arduino-libraries/NTPClient@^3.2.1
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	https://github.com/me-no-dev/AsyncTCP.git
	bblanchon/ArduinoJson@^6.21.3
	DNSServer
	adafruit/Adafruit SHT4x@^1.0.0
