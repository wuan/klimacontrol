# OpenSpec Configuration for @fission-ai/openspec

# Validation rules
rules:
  # Require that all specifications have a purpose section
  - id: require-purpose
    description: All specifications must have a "Purpose" section (## Purpose)
    severity: error
    given: "$"
    then:
      function: pattern
      functionOptions:
        match: "## Purpose"

  # Require that all requirements are properly numbered
  - id: valid-requirement-format
    description: Requirements must follow the format "X. **SX.Y** Description" (e.g., 1. **S1.1**) or "X. **SXX-Y** Description" (e.g., 1. **S01-1**)
    severity: error
    given: "$"
    then:
      function: pattern
      functionOptions:
        match: "^\s*[0-9]+\.\s+\*\*S[0-9]{1,2}[-.][0-9]+\*\*"

  # Require that all scenarios are properly formatted
  - id: valid-scenario-format
    description: Scenarios must follow the format "### Scenario SX-Y: Description" or "### Scenario SXX-Y: Description"
    severity: error
    given: "$"
    then:
      function: pattern
      functionOptions:
        match: "^### Scenario S[0-9]{1,2}-[A-Z]:"

# Documentation generation settings
output:
  directory: docs/specs
  template: default
  assets:
    - path: styles.css
      content: |
        body {
          font-family: Arial, sans-serif;
          line-height: 1.6;
          max-width: 800px;
          margin: 0 auto;
          padding: 20px;
          color: #333;
        }
        h1, h2, h3 {
          color: #2c3e50;
        }
        table {
          border-collapse: collapse;
          width: 100%;
          margin: 20px 0;
        }
        th, td {
          border: 1px solid #ddd;
          padding: 8px;
          text-align: left;
        }
        th {
          background-color: #f2f2f2;
        }
        pre {
          background: #f4f4f4;
          padding: 10px;
          border-radius: 5px;
          overflow-x: auto;
        }
        .requirement {
          background: #f8f9fa;
          padding: 10px;
          margin: 10px 0;
          border-left: 4px solid #3498db;
        }
        .scenario {
          background: #f8f9fa;
          padding: 10px;
          margin: 10px 0;
          border-left: 4px solid #2ecc71;
        }