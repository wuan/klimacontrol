<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klima-Control - Temperature Controller</title>
    <link rel="stylesheet" href="/common.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="pageTitle">ledz</h1>
            <div class="device-id">
                <span id="deviceId">Loading...</span>
                <span id="firmwareVersion" style="opacity: 0.7; font-size: 0.9em; margin-left: 10px;"></span>
                <span id="otaPartition" style="opacity: 0.6; font-size: 0.85em; margin-left: 5px;"></span>
            </div>
        </div>

        <div class="content">
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-label">Current Temperature</div>
                    <div class="status-value" id="currentTemp">-</div>
                </div>
                <div class="status-item">
                    <div class="status-label">Current Humidity</div>
                    <div class="status-value" id="currentHumidity">-</div>
                </div>
                <div class="status-item">
                    <div class="status-label">Target Temperature</div>
                    <div class="status-value" id="targetTemp">-</div>
                </div>
                <div class="status-item">
                    <div class="status-label">Control Status</div>
                    <div class="status-value" id="controlStatus">-</div>
                </div>
                <div class="status-item" id="timerStatusItem" style="display: none;">
                    <div class="status-label">Timers</div>
                    <div class="status-value" id="timerStatus">-</div>
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <a href="/settings" class="about-link" style="flex: 1; text-align: center;">Settings</a>
            <a href="/timers" class="about-link" style="flex: 1; text-align: center;">Timers</a>
            <a href="/about" class="about-link" style="flex: 1; text-align: center;">Device Info</a>
        </div>
    </div>

    <script>
        let currentStatus = {};

        // Update device info display
        function updateDeviceInfo() {
            const pageTitleElement = document.getElementById('pageTitle');
            const deviceIdElement = document.getElementById('deviceId');

            if (currentStatus.device_id) {
                const hostname = "ledz-" + currentStatus.device_id.toLowerCase();
                const hasCustomName = currentStatus.device_name && currentStatus.device_name !== currentStatus.device_id;

                // Update page title with custom name if set
                if (hasCustomName) {
                    pageTitleElement.textContent = 'Klima-Control ' + currentStatus.device_name;
                } else {
                    pageTitleElement.textContent = 'Klima-Control';
                }

                // Device ID and technical details
                let infoHTML = currentStatus.device_id;

                if (currentStatus.wifi_connected && currentStatus.wifi_ssid) {
                    infoHTML += `<br><small style="font-size: 11px; font-weight: normal;">
                        WiFi: ${currentStatus.wifi_ssid}<br>
                        Access at: <a href="http://${hostname}.local/" style="color: inherit; text-decoration: underline;">${hostname}.local</a>
                    </small>`;
                } else {
                    infoHTML += `<br><small style="font-size: 11px; font-weight: normal;">
                        Access at: <a href="http://${hostname}.local/" style="color: inherit; text-decoration: underline;">${hostname}.local</a>
                    </small>`;
                }

                deviceIdElement.innerHTML = infoHTML;
            }

            // Update firmware version
            const firmwareVersionElement = document.getElementById('firmwareVersion');
            if (firmwareVersionElement && currentStatus.firmware_version) {
                firmwareVersionElement.textContent = currentStatus.firmware_version;
            }

            // Update OTA partition
            const otaPartitionElement = document.getElementById('otaPartition');
            if (otaPartitionElement && currentStatus.ota_partition) {
                otaPartitionElement.textContent = `(${currentStatus.ota_partition})`;
            }
        }

        // Initialize
        async function init() {
            await updateStatus();
        }
        init();

        // Update status periodically
        setInterval(updateStatus, 10000);

        // Fetch and update device status
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                currentStatus = await response.json();
                
                // Update device info (device ID, firmware version, OTA partition)
                updateDeviceInfo();
                
                // Update temperature/humidity displays
                // Update temperature display
                const tempElement = document.getElementById('currentTemp');
                if (tempElement && currentStatus.temperature !== undefined) {
                    tempElement.textContent = `${currentStatus.temperature.toFixed(1)}°C`;
                }
                
                // Update humidity display
                const humidityElement = document.getElementById('currentHumidity');
                if (humidityElement && currentStatus.humidity !== undefined) {
                    humidityElement.textContent = `${currentStatus.humidity.toFixed(1)}%`;
                }
                
                // Update target temperature display
                const targetTempElement = document.getElementById('targetTemp');
                if (targetTempElement && currentStatus.target_temperature !== undefined) {
                    targetTempElement.textContent = `${currentStatus.target_temperature.toFixed(1)}°C`;
                }
                
                // Update control status
                const controlStatusElement = document.getElementById('controlStatus');
                if (controlStatusElement) {
                    controlStatusElement.textContent = currentStatus.control_enabled ? 'Active' : 'Off';
                    controlStatusElement.style.color = currentStatus.control_enabled ? '#28a745' : '#dc3545';
                }
            } catch (error) {
                console.error('Failed to update status:', error);
            }
        }

        // Timer status display
        let cachedTimers = [];
        let timersFetchedAt = 0;

        function formatTime(seconds) {
            if (seconds <= 0) return '0s';
            if (seconds < 60) {
                return `${seconds}s`;
            } else if (seconds < 3600) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return secs > 0 ? `${mins}m ${secs}s` : `${mins}m`;
            } else {
                const hours = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                return mins > 0 ? `${hours}h ${mins}m` : `${hours}h`;
            }
        }

        function formatTimeOfDay(secondsSinceMidnight) {
            const hours = Math.floor(secondsSinceMidnight / 3600);
            const mins = Math.floor((secondsSinceMidnight % 3600) / 60);
            return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
        }

        async function fetchTimers() {
            try {
                const response = await fetch('/api/timers');
                const data = await response.json();
                cachedTimers = (data.timers || []).filter(t => t.enabled);
                timersFetchedAt = Date.now();
                updateTimerDisplay();
            } catch (error) {
                console.error('Failed to load timers:', error);
            }
        }

        function updateTimerDisplay() {
            const timerStatusItem = document.getElementById('timerStatusItem');
            const timerStatus = document.getElementById('timerStatus');
            const elapsedSeconds = Math.floor((Date.now() - timersFetchedAt) / 1000);

            // Filter out expired timers
            const activeTimers = cachedTimers.filter(t => {
                if (t.type_name === 'alarm_daily') return true;
                return t.remaining_seconds - elapsedSeconds > 0;
            });

            if (activeTimers.length === 0) {
                timerStatusItem.style.display = 'none';
                if (cachedTimers.length > 0) {
                    // A timer may have expired, refresh from backend
                    cachedTimers = [];
                    fetchTimers();
                }
            } else {
                timerStatusItem.style.display = 'block';
                const timer = activeTimers[0];
                const actionText = timer.action === 0 ? 'Preset' : 'Off';
                let timeInfo = '';
                switch (timer.type_name) {
                    case 'countdown':
                        const remaining = Math.max(0, timer.remaining_seconds - elapsedSeconds);
                        timeInfo = formatTime(remaining);
                        break;
                    case 'alarm_daily':
                        timeInfo = formatTimeOfDay(timer.target_time);
                        break;
                }
                const countSuffix = activeTimers.length > 1 ? ` (+${activeTimers.length - 1})` : '';
                timerStatus.textContent = `${actionText} ${timeInfo}${countSuffix}`;
            }
        }

        fetchTimers();
        setInterval(updateTimerDisplay, 1000);
    </script>
</body>
</html>
