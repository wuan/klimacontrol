openapi: 3.0.3
info:
  title: KlimaControl API
  description: REST API for controlling and monitoring the KlimaControl temperature/humidity system
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://{device-id}.local/api
    description: Local device API (mDNS)
    variables:
      device-id:
        default: klima-aabbcc
        description: Device mDNS hostname
  - url: http://192.168.4.1/api
    description: Access Point mode

paths:
  /status:
    get:
      operationId: getStatus
      summary: Get current system status
      description: Returns device info, sensor data, temperature control status, and WiFi status
      tags:
        - status
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatus'

  /temperature/target:
    post:
      operationId: setTargetTemperature
      summary: Set target temperature
      tags:
        - control
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: number
                  format: float
                  description: Target temperature in °C
                  example: 22.5
              required:
                - value
      responses:
        '200':
          description: Target temperature updated

components:
  schemas:
    SystemStatus:
      type: object
      properties:
        device_id:
          type: string
          description: Device identifier
          example: "D3E4F5"
        device_name:
          type: string
          description: Configured device name
          example: "Klima-Control"
        firmware_version:
          type: string
          description: Firmware version string
          example: "v1.0.0"
        elevation:
          type: number
          format: float
          description: Configured elevation in meters
          example: 100.0
        ota_partition:
          type: string
          description: Currently running OTA partition label
          example: "app0"
        sensor_connected:
          type: boolean
          description: Whether sensors are connected
          example: true
        sensor_valid:
          type: boolean
          description: Whether sensor data is valid
          example: true
        temperature:
          type: number
          format: float
          description: Current temperature in °C
          example: 23.45
        relative_humidity:
          type: number
          format: float
          description: Current relative humidity in %
          example: 45.6
        dew_point:
          type: number
          format: float
          description: Calculated dew point in °C
          example: 14.2
        sensor_timestamp:
          type: integer
          description: Timestamp of last sensor reading
          example: 1704067200
        target_temperature:
          type: number
          format: float
          description: Target temperature in °C
          example: 22.0
        control_enabled:
          type: boolean
          description: Whether temperature control is active
          example: true
        wifi_connected:
          type: boolean
          description: WiFi connection status
          example: true
        ip_address:
          type: string
          description: Local IP address
          example: "192.168.1.100"
        wifi_ssid:
          type: string
          description: Connected WiFi SSID
          example: "MyNetwork"

tags:
  - name: control
    description: Temperature control operations
  - name: status
    description: System status and monitoring