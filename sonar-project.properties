# SonarCloud configuration for Klima-Control project
# https://sonarcloud.io

# Project key (replace with your actual SonarCloud project key)
sonar.projectKey=wuan_klimacontrol
sonar.organization=wuan

# Project name and version
sonar.projectName=Klima-Control
sonar.projectVersion=1.0

# Source files to analyze
sonar.sources=src

# Exclude test files from analysis
sonar.exclusions=test/**,**/test_**,**/*_test.cpp,scripts/**,src/generated/**

# Coverage configuration
sonar.cfamily.coverage.reportPaths=coverage/coverage_filtered.info
sonar.cfamily.gcov.reportsPath=.

# Encoding
sonar.sourceEncoding=UTF-8

# C++ specific settings
sonar.cfamily.threads=2
sonar.cfamily.cache.enabled=true
sonar.cfamily.cache.path=.sonarccache

# Exclude hardware-specific code from coverage requirements
sonar.coverage.exclusions=**/hardware/**,**/esp32/**,**/arduino/**,**/platformio/**,**/main.cpp

# Test file pattern
sonar.test.inclusions=test/**
sonar.tests=test

# Build wrapper (for native builds)
sonar.cfamily.build-wrapper-output=build_wrapper_output
