sonar.projectKey=wuan_klimacontrol
sonar.organization=wuan

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src
sonar.exclusions=scripts/**, src/generated/**

# Coverage report generated by scripts/generate_coverage.py after 'pio test -e native'
sonar.cfamily.coverage.reportPaths=coverage/coverage.info

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8
