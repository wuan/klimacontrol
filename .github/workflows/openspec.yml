name: OpenSpec Validation

on:
  push:
    paths:
      - 'specs/**'
      - '.github/workflows/openspec.yml'
  pull_request:
    paths:
      - 'specs/**'
      - '.github/workflows/openspec.yml'

jobs:
  validate-specs:
    name: Validate OpenSpec Documents
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate OpenSpec changes and specs
        run: npx -y @fission-ai/openspec@latest validate --all --strict --no-interactive
