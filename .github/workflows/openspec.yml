name: OpenSpec Validation

on:
  push:
    paths:
      - 'specs/**'
      - '.github/workflows/openspec.yml'
  pull_request:
    paths:
      - 'specs/**'
      - '.github/workflows/openspec.yml'

jobs:
  validate-specs:
    name: Validate OpenSpec Documents
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec

      - name: Validate OpenSpec documents
        run: |
          # Validate all spec files
          openspec validate specs/

      - name: Generate HTML documentation
        run: |
          # Create output directory
          mkdir -p docs/specs
          
          # Generate index page
          python -c "
          import os, re
          
          # Get all spec files
          files = sorted([f for f in os.listdir('specs/') if f.endswith('.md')])
          
          # Generate HTML index
          html = '''<!DOCTYPE html>
          <html>
          <head>
              <meta charset='utf-8'>
              <title>Klima-Control Specifications</title>
              <style>
                  body { font-family: Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; }
                  h1 { color: #2c3e50; }
                  ul { list-style-type: none; padding: 0; }
                  li { margin: 10px 0; padding: 10px; background: #f9f9f9; border-radius: 5px; }
                  a { text-decoration: none; color: #3498db; font-weight: bold; }
                  a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <h1>Klima-Control Specifications</h1>
              <ul>
          '''
          
          for file in files:
              if file == 'spec.md':
                  name = 'Index'
                  num = ''
              else:
                  num = file.split('-')[0]
                  name = file.split('-')[1].split('.')[0].replace('-', ' ').title()
              html += f'                  <li><a href="{os.path.splitext(file)[0]}.html">{num} {name}</a></li>\n'
          
          html += '''              </ul>
          </body>
          </html>'''
          
          with open('docs/specs/index.html', 'w') as f:
              f.write(html)
          "
          
          # Convert all spec files to HTML using OpenSpec CLI
          for file in specs/*.md; do
              filename=$(basename "$file" .md)
              echo "Generating HTML for $file to docs/specs/$filename.html"
              npx @fission-ai/openspec render "$file" --output "docs/specs/$filename.html"
          done

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v3
        with:
          name: openspec-documentation
          path: docs/specs/